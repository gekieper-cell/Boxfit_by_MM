<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Boxfit by MM  Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--red:#c0392b;--gold:#f39c12;--bg:#0a0a0a;--text:#e8e8e8}
        body{font-family:'Barlow Condensed',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
        .login-card{background:#111;padding:40px;border:1px solid #2a2a2a;border-radius:10px;text-align:center;width:100%;max-width:350px}
        h1{font-family:'Bebas Neue';font-size:3rem;color:var(--gold);margin-bottom:20px}
        input{width:100%;padding:12px;margin:10px 0;background:#1a1a1a;border:1px solid #333;color:white;border-radius:5px}
        button{width:100%;padding:12px;background:var(--red);border:none;color:white;font-family:'Bebas Neue';font-size:1.5rem;cursor:pointer;margin-top:20px}
        button:hover{background:#a33226}
        .error{color:var(--red);display:none;margin-top:10px}
    </style>
</head>
<body>
    <div class="login-card">
        <h1>BOXFIT_BY_MM</h1>
        <input type="text" id="user" placeholder="USUARIO">
        <input type="password" id="pass" placeholder="CONTRASEčA">
        <button onclick="login()">INGRESAR</button>
        <div id="err" class="error">Credenciales incorrectas</div>
    </div>
    <script>
        async function login(){
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user, pass})
            });
            if(res.ok) window.location.href = '/';
            else document.getElementById('err').style.display = 'block';
        }
    </script>
</body>
</html>
