<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Boxfit by MM - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; }
        .card-custom { background: #2d2d2d; border: 1px solid #444; border-radius: 15px; }
        .btn-box { background: #d4af37; color: black; font-weight: bold; border: none; }
        .btn-box:hover { background: #f1c40f; }
        .stat-val { font-size: 2rem; color: #d4af37; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🥊 Boxfit_by_MM</span>
            <div class="d-flex">
                <span class="badge bg-warning text-dark me-2">Admin: Activo</span>
                <a href="/reset_admin" class="btn btn-outline-light btn-sm">Recuperar Clave</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row text-center mb-4">
            <div class="col-md-4">
                <div class="card card-custom p-3">
                    <h5>Alumnos Activos</h5>
                    <p class="stat-val" id="count-alumnos">--</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-custom p-3">
                    <h5>Morosos</h5>
                    <p class="stat-val text-danger" id="count-morosos">--</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-custom p-3">
                    <h5>Caja Diaria</h5>
                    <p class="stat-val text-success">$ 0.00</p>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card card-custom p-4 h-100">
                    <h3>🛒 Ventas Rápidas</h3>
                    <hr>
                    <div class="row g-2">
                        <div class="col-6"><button class="btn btn-box w-100 p-3">💧 Agua / Rehidr.</button></div>
                        <div class="col-6"><button class="btn btn-box w-100 p-3">🥤 Bebida Energ.</button></div>
                        <div class="col-6"><button class="btn btn-box w-100 p-3">🥊 Guantes / Vendas</button></div>
                        <div class="col-6"><button class="btn btn-box w-100 p-3">👕 Merchandising</button></div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card card-custom p-4 h-100">
                    <h3>🆔 Control de Acceso</h3>
                    <hr>
                    <p>Ingrese últimos 3 del DNI o escanee QR:</p>
                    <div class="input-group mb-3">
                        <input type="text" id="dni_input" class="form-control bg-dark text-white border-secondary" placeholder="Ej: 456">
                        <button class="btn btn-box" onclick="marcarAsistencia()">Ingresar</button>
                    </div>
                    <div id="resultado-asistencia" class="mt-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function marcarAsistencia() {
            let dni = document.getElementById('dni_input').value;
            fetch('/asistencia', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({identificador: dni})
            })
            .then(res => res.json())
            .then(data => {
                let div = document.getElementById('resultado-asistencia');
                div.innerHTML = `<div class="alert alert-${data.status == 'success' ? 'success' : 'danger'}">${data.msg}</div>`;
            });
        }
    </script>
</body>
</html>
